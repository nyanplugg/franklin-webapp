<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franklin VPN — Подписка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0A0E0C; color: #E8EDE9; padding: 0; max-width: 480px; margin: 0 auto; min-height: 100vh; }
        .header { padding: 28px 20px 20px; background: linear-gradient(180deg, #0D1512 0%, #0A0E0C 100%); border-bottom: 1px solid rgba(76, 175, 80, 0.08); }
        .header-title { font-size: 20px; font-weight: 700; color: #FFFFFF; }
        .header-subtitle { font-size: 13px; color: #5C6B63; margin-top: 4px; }
        .tabs { display: flex; margin: 16px 16px 0; background: #111714; border-radius: 10px; padding: 3px; border: 1px solid rgba(255,255,255,0.04); }
        .tab { flex: 1; padding: 11px 0; text-align: center; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: #5C6B63; border-radius: 8px; }
        .tab.active { background: #19231D; color: #4CAF50; font-weight: 600; }
        .content { padding: 16px; }
        .panel { display: none; }
        .panel.active { display: block; }
        .card { background: #111714; border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; overflow: hidden; }
        .card-row { display: flex; justify-content: space-between; padding: 15px 18px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .card-row:last-child { border-bottom: none; }
        .card-label { font-size: 14px; color: #5C6B63; }
        .card-value { font-size: 14px; font-weight: 600; color: #E8EDE9; }
        .card-value.accent { color: #4CAF50; background: rgba(76, 175, 80, 0.08); padding: 4px 12px; border-radius: 20px; font-size: 13px; }
        .card-value.warning { color: #D4A24E; background: rgba(212, 162, 78, 0.08); padding: 4px 12px; border-radius: 20px; font-size: 13px; }
        .progress-section { background: #111714; border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 18px; margin-top: 12px; }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; color: #5C6B63; }
        .progress-bar { height: 6px; background: #1A211E; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3D8C40, #4CAF50); border-radius: 3px; }
        .progress-days { text-align: center; margin-top: 10px; font-size: 13px; color: #5C6B63; }
        .progress-days strong { color: #E8EDE9; }
        .no-sub { text-align: center; padding: 40px 20px; color: #5C6B63; }
        .no-sub .icon { font-size: 48px; margin-bottom: 16px; }
        .no-sub .title { font-size: 18px; font-weight: 600; color: #E8EDE9; margin-bottom: 8px; }
        .copy-key { margin-top: 16px; background: #111714; border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 16px; }
        .copy-key textarea { width: 100%; height: 40px; background: #0A0E0C; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; color: #4CAF50; font-size: 11px; padding: 10px; resize: none; font-family: monospace; margin-bottom: 10px; }
        .copy-btn { width: 100%; padding: 12px; background: #19231D; border: 1px solid rgba(76, 175, 80, 0.2); border-radius: 8px; color: #4CAF50; font-size: 14px; font-weight: 500; cursor: pointer; }
        .store-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 14px; background: #19231D; border: 1px solid rgba(76, 175, 80, 0.2); border-radius: 10px; color: #4CAF50; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 6px; text-decoration: none; }
        .store-btn .icon { font-size: 20px; }
        .section-title { font-size: 14px; font-weight: 600; color: #E8EDE9; margin: 16px 0 8px; }
        .step { background: #111714; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; }
        .step-number { width: 28px; height: 28px; min-width: 28px; background: #19231D; border: 1px solid rgba(76, 175, 80, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #4CAF50; }
        .step-done { width: 28px; min-width: 28px; height: 28px; background: rgba(76, 175, 80, 0.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .step-content { font-size: 14px; line-height: 1.5; color: #9BAAA2; }
        .step-content a { color: #4CAF50; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">Franklin VPN</div>
        <div class="header-subtitle">Управление подпиской</div>
    </div>
    <div class="tabs">
        <button class="tab active" onclick="switchTab('status')">Состояние</button>
        <button class="tab" onclick="switchTab('setup')">Подключение</button>
    </div>
    <div class="content">
        <div class="panel active" id="panel-status">
            <div id="status-content"></div>
        </div>
        <div class="panel" id="panel-setup">
            <div id="setup-content"></div>
        </div>
    </div>
    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.ready();
        const params = new URLSearchParams(window.location.search);
        const userName = params.get('name') || 'Пользователь';
        const expireDate = params.get('expire') || '';
        const daysLeft = parseInt(params.get('days') || '0');
        const totalDays = parseInt(params.get('total') || '30');
        const keyValue = params.get('key') || '';
        const isActive = params.get('active') === '1';

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            if (tab === 'status') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('panel-status').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('panel-setup').classList.add('active');
            }
        }

        function copyKey() {
            document.getElementById('keyTextarea').select();
            document.execCommand('copy');
            document.getElementById('copyBtn').textContent = 'Скопировано!';
            setTimeout(() => { document.getElementById('copyBtn').textContent = 'Скопировать ключ'; }, 2000);
        }

        function buildStatus() {
            if (!isActive || daysLeft <= 0) {
                document.getElementById('status-content').innerHTML = `<div class="no-sub"><div class="icon">🔐</div><div class="title">Нет активной подписки</div><p>Приобретите подписку в боте</p></div>`;
                return;
            }
            const percent = Math.round((daysLeft / totalDays) * 100);
            let sc = 'accent', st = 'Активна', pb = '';
            if (daysLeft <= 3) { sc = 'warning'; st = 'Заканчивается'; pb = ' warning'; }
            document.getElementById('status-content').innerHTML = `
                <div class="card">
                    <div class="card-row"><span class="card-label">Пользователь</span><span class="card-value">${userName}</span></div>
                    <div class="card-row"><span class="card-label">Действует до</span><span class="card-value">${expireDate}</span></div>
                    <div class="card-row"><span class="card-label">Статус</span><span class="card-value ${sc}">${st}</span></div>
                    <div class="card-row"><span class="card-label">Трафик</span><span class="card-value">Безлимит</span></div>
                    <div class="card-row"><span class="card-label">Использовано</span><span class="card-value">${totalDays - daysLeft} из ${totalDays} дней</span></div>
                </div>
                <div class="progress-section">
                    <div class="progress-header"><span>Период использования</span><span>${percent}%</span></div>
                    <div class="progress-bar"><div class="progress-fill${pb}" style="width:${percent}%;"></div></div>
                    <div class="progress-days">Осталось <strong>${daysLeft} ${getDaysWord(daysLeft)}</strong></div>
                </div>`;
        }

        function buildSetup() {
            if (!keyValue) {
                document.getElementById('setup-content').innerHTML = `<div class="no-sub"><div class="icon">🔑</div><div class="title">Нет ключа</div><p>Получите ключ в боте</p></div>`;
                return;
            }
            document.getElementById('setup-content').innerHTML = `
                <div class="section-title">📱 Android</div>
                <a class="store-btn" href="https://play.google.com/store/apps/details?id=com.happproxy" target="_blank"><span class="icon">📦</span> HAPP — Google Play</a>
                <a class="store-btn" href="https://play.google.com/store/apps/details?id=com.v2raytun.android" target="_blank"><span class="icon">📦</span> v2RayTun — Google Play</a>
                <div class="step"><div class="step-number">1</div><div class="step-content">Скачайте приложение по кнопке выше</div></div>
                <div class="step"><div class="step-number">2</div><div class="step-content">Нажмите для импорта ключа:<br><a href="happ://import/${encodeURIComponent(keyValue)}">Открыть в HAPP</a> &nbsp;|&nbsp; <a href="v2raytun://import?url=${encodeURIComponent(keyValue)}">Открыть в v2RayTun</a></div></div>
                <div class="step"><div class="step-done">✓</div><div class="step-content">Включите подключение. Готово!</div></div>

                <div class="section-title">🍎 iOS</div>
                <a class="store-btn" href="https://apps.apple.com/us/app/happ-proxy-utility/id6504287215?l=ru" target="_blank"><span class="icon">📦</span> HAPP — App Store</a>
                <a class="store-btn" href="https://apps.apple.com/us/app/v2raytun/id6476628951?l=ru" target="_blank"><span class="icon">📦</span> v2RayTun — App Store</a>
                <div class="step"><div class="step-number">1</div><div class="step-content">Скачайте приложение по кнопке выше</div></div>
                <div class="step"><div class="step-number">2</div><div class="step-content">Нажмите для импорта ключа:<br><a href="happ://import/${encodeURIComponent(keyValue)}">Открыть в HAPP</a> &nbsp;|&nbsp; <a href="v2raytun://import?url=${encodeURIComponent(keyValue)}">Открыть в v2RayTun</a></div></div>
                <div class="step"><div class="step-done">✓</div><div class="step-content">Включите подключение. Готово!</div></div>

                <div class="copy-key"><textarea id="keyTextarea" readonly>${keyValue}</textarea><button class="copy-btn" id="copyBtn" onclick="copyKey()">Скопировать ключ</button></div>`;
        }

        function getDaysWord(d) {
            if (d % 10 === 1 && d % 100 !== 11) return 'день';
            if ([2,3,4].includes(d % 10) && ![12,13,14].includes(d % 100)) return 'дня';
            return 'дней';
        }

        buildStatus();
        buildSetup();
    </script>
</body>
</html>
